revolte:
  version: '1.0'
  project: San proj
  appName: Final application 1 for webapp
  config:
    codeReview:
      summarize: true
      suggestFixes: true
      commentStyle: Balanced
    testSuite:
      command: npm run test
  workflow:
    developerWorkflow:
      enabled: true
  env:
    qa:
      codeReview: false
      codeQuality: false
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    staging:
      codeReview: false
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    production:
      codeReview: false
      testSuite: true
      branch: main
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
    preview:
      codeReview: false
      testSuite: true
      services:
        rid_1:
          type: WEB_APP
          name: web_app_service
          entryPoint: index.js
          properties:
            indexPage: index.html
            errorPage: error.html
            enableCdn: false
            variables:
              BASE_URL: /api/v1
